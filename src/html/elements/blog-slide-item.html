<div class="swiper-slide blog__slide anim-item">
  <a class="blog__item" href="@@link">
    <div class="blog__item-head">
      <div class="blog__item-cover">
        <img src="@@img" alt="">
      </div>
    </div>
    <div class="blog__item-body">
      <div class="blog__item-content">
        <div class="blog__item-title">
          <span>
            @@title
          </span>
        </div>
        <div class="blog__item-date">
          <p>
            @@date
          </p>
        </div>
        <div class="blog__item-text">
          <p>
            @@text
          </p>
        </div>
      </div>
      <div class="blog__item-btn btn btn--gray">
        Читать статью
      </div>
    </div>
  </a>
</div>
