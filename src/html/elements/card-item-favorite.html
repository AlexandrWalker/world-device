<div class="card__item @@stock" data-gallery>
  <div class="card__item-remove">
    <button class="card__item-control--btn item-btn--js">
      <i class="icon-trash"></i>
    </button>
  </div>
  <a class="card__item-head" href="@@link">
    <div class="card__item-cover swiper-no-swiping">
      @@imgs
      <div class="card__item-dots"></div>
    </div>
    <div class="card__item-offer">
      @@offer
    </div>
  </a>
  <div class="card__item-body">
    <div class="card__item-content">
      <a class="card__item-name" href="@@link">
        <span>
          @@name
        </span>
      </a>
      <div class="card__item-wrap">
        <div class="card__item-code">
          Код товара: <span>@@code</span>
        </div>
        <div class="card__item-status">
          @@status
        </div>
      </div>
      <div class="card__item-price">
        @@price
      </div>
    </div>
  </div>
  <div class="card__item-foot">
    <div class="card__item-btns">
      <button class="card__item-btn btn btn--blue">
        В корзину
      </button>
      <button class="card__item-btn btn btn--gray">
        Быстрый заказ
      </button>
      <div class="card__stock-btn btn btn--gray">
        Узнать о поступлении
      </div>
    </div>
    <div class="card__item-control">
      <button class="card__item-control--btn item-btn--js">
        <i class="icon-sravnenie"></i>
      </button>
      <button class="card__item-control--btn item-btn--js">
        <i class="icon-favorite"></i>
      </button>
    </div>
    <a class="card__item-link" href="/">
      Узнать о поступлении
    </a>
  </div>
</div>
