<div class="swiper-slide reviews__slide anim-item">
  <a class="reviews__item" href="@@link">
    <div class="reviews__item-wrapper">
      <div class="reviews__item-head">
        <div class="reviews__item-icon">
          <img src="@@icon" alt="">
        </div>
      </div>
      <div class="reviews__item-body">
        <div class="reviews__item-content">
          <div class="reviews__item-name">
            @@name
          </div>
          <div class="reviews__item-wrap">
            <div class="reviews__item-date">
              @@date
            </div>
            <div class="reviews__item-rating">
            </div>
          </div>
          <div class="reviews__item-text">
            <p>
              @@text
            </p>
          </div>
        </div>
        <div class="reviews__item-gallery">
          <div class="reviews__item-img">
            <img src="@@img1" alt="">
          </div>
          <div class="reviews__item-img">
            <img src="@@img2" alt="">
          </div>
        </div>
      </div>
    </div>
    <div class="reviews__item-foot">
      <div class="reviews__item-btn btn btn--gray">
        Читать весь отзыв
      </div>
    </div>
  </a>
</div>
