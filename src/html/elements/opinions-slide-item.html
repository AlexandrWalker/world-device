<div class="swiper-slide opinions__slide">
  <div class="opinions__item anim-item">
    <div class="opinions__item-head">
      <div class="opinions__item-icon">
        <img src="@@icon" alt="">
      </div>
      <div class="opinions__item-wrap">
        <div class="opinions__item-name">
          @@name
        </div>
        <div class="opinions__item-date">
          @@date
        </div>
      </div>
    </div>
    <div class="opinions__item-body">
      <div class="opinions__item-text">
        <p>
          @@text
        </p>
      </div>
      <a class="opinions__item-btn" href="@@opinions-photo" data-fancybox>
        Смотреть оригинал отзыва
      </a>
    </div>
    <div class="opinions__item-foot">
      <div class="opinions__item-subtitle">
        @@subtitle
      </div>
      <div class="opinions__item-tags">
        @@tags
      </div>
    </div>
  </div>
</div>
