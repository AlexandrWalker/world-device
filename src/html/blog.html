<!DOCTYPE html>
<html lang="ru" class="inner-page">
@@include('blocks/head.html', {"title": "World Device"})

<body>
  <div class="wrapper">
    <!-- Шапка -->
    @@include('./blocks/header.html')
    <main class="main">

      <section class="template">
        <div class="container">
          <div class="template__inner">

            <div class="breadcrumbs">
              <ul>
                <li>
                  <a href="/world-device">
                    <span>
                      На главную
                    </span>
                  </a>
                </li>
                <li>
                  <span>
                    Блог
                  </span>
                </li>
              </ul>
            </div>

            <div class="template__wrapper">
              <div class="template__title" data-split="lines">
                <h1>
                  Блог
                </h1>
              </div>
            </div>

          </div>
        </div>
      </section>

      <section class="blog">
        <div class="container">
          <div class="blog__inner">

            <div class="general__tabs">
              <button class="general__tab is-active" type="button">
                Обзоры
              </button>
              <button class="general__tab" type="button">
                Статьи
              </button>
              <button class="general__tab" type="button">
                Все вместе
              </button>
            </div>

            <div class="blog__items anim-items">
              @@loop('./elements/blog-item.html', './data/blog-slide-items.json')
            </div>

          </div>
        </div>
      </section>

    </main>
    <!-- Подвал -->
    @@include('blocks/footer.html')
