            <style>
              .neuron {
                display: block;
                overflow: visible;
              }

              /* Медленное бесконечное вращение */
              .neuron__rotate {
                transform-origin: 12px 12px;
                animation: neuron-spin 20s linear infinite;
              }

              /* Покачивание и пульсация */
              .neuron__body {
                transform-origin: 12px 12px;
                animation: neuron-live 6s ease-in-out infinite;
              }

              @keyframes neuron-spin {
                0% {
                  transform: rotate(0deg);
                }

                100% {
                  transform: rotate(360deg);
                }
              }

              @keyframes neuron-live {
                0% {
                  transform: translateY(0px) scale(0.9);
                }

                25% {
                  transform: translateY(-1px) scale(1.02);
                }

                50% {
                  transform: translateY(0px) scale(0.9);
                }

                75% {
                  transform: translateY(-1px) scale(1.02);
                }

                100% {
                  transform: translateY(0px) scale(0.9);
                }
              }
            </style>
